---
apiVersion: v1
kind: Secret
metadata:
  name: neo4j-secret
  namespace: edap
type: Opaque
stringData:
  NEO4J_AUTH: "neo4j/neo4jpass_change_me"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: edap
  labels:
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: graph-database
spec:
  serviceName: neo4j-headless
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5
          ports:
            - containerPort: 7474
              name: http
            - containerPort: 7687
              name: bolt
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: neo4j-secret
                  key: NEO4J_AUTH
            - name: NEO4J_PLUGINS
              value: '["apoc"]'
            - name: NEO4J_dbms_security_procedures_unrestricted
              value: "apoc.*"
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
            - name: neo4j-logs
              mountPath: /logs
          readinessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 60
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /
              port: 7474
            initialDelaySeconds: 90
            periodSeconds: 30
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
    - metadata:
        name: neo4j-logs
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-service
  namespace: edap
  labels:
    app.kubernetes.io/name: neo4j
spec:
  type: ClusterIP
  selector:
    app: neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687

---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-headless
  namespace: edap
spec:
  clusterIP: None
  selector:
    app: neo4j
  ports:
    - port: 7687
