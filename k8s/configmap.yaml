apiVersion: v1
kind: ConfigMap
metadata:
  name: edap-config
  namespace: edap
  labels:
    app.kubernetes.io/name: edap
    app.kubernetes.io/component: config
data:
  SPRING_PROFILES_ACTIVE: "docker"
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-service:3306/edap_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
  SPRING_DATASOURCE_USERNAME: "edap_user"
  SPRING_NEO4J_URI: "bolt://neo4j-service:7687"
  SPRING_NEO4J_AUTHENTICATION_USERNAME: "neo4j"
  JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseContainerSupport"
  GRPC_SERVER_PORT: "9090"
