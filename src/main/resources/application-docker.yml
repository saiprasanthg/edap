# Docker-specific overrides — active when SPRING_PROFILES_ACTIVE=docker
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/edap_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: edap_user
    password: edap_pass

  neo4j:
    uri: bolt://neo4j:7687
    authentication:
      username: neo4j
      password: neo4jpass

logging:
  level:
    com.edap: INFO
